<script>
// ═══════════════════════════════════════════════════
//  STATE — all in one object, no fragile globals
// ═══════════════════════════════════════════════════
const S = {
  completed: new Set(),
  total: 6,
  timers: {},
  openCard: null,
  calYear: new Date().getFullYear(),
  calMonth: new Date().getMonth(),
  modal: { day: null, trained: null, pain: null }
};

// ═══════════════════════════════════════════════════
//  DATA — safe localStorage wrapper
// ═══════════════════════════════════════════════════
function getData() {
  try { return JSON.parse(localStorage.getItem('joelho_v3') || '{}'); }
  catch { return {}; }
}
function saveData(d) {
  try { localStorage.setItem('joelho_v3', JSON.stringify(d)); }
  catch { console.warn('storage unavailable'); }
}

// ═══════════════════════════════════════════════════
//  NAVIGATION — no event dependency
// ═══════════════════════════════════════════════════
function goPage(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  document.getElementById('pg-' + id).classList.add('on');
  btn.classList.add('on');
  if (id === 'calendario') renderCal();
}

// ═══════════════════════════════════════════════════
//  PAIN SCALE (treino page)
// ═══════════════════════════════════════════════════
function selPain(btn) {
  document.querySelectorAll('.pn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  const v = parseInt(btn.dataset.v);
  document.getElementById('painAlert').classList.toggle('on', v >= 7);
}

// ═══════════════════════════════════════════════════
//  BAND SELECTOR — isolated by container id
// ═══════════════════════════════════════════════════
function selBand(containerId, btn, band) {
  const container = document.getElementById(containerId);
  container.querySelectorAll('.bopt').forEach(b => {
    b.className = 'bopt';
    b.textContent = b.textContent.replace(' ✓', '');
  });
  btn.classList.add('on-' + band);
  if (!btn.textContent.includes('✓')) btn.textContent += ' ✓';
}

// ═══════════════════════════════════════════════════
//  CARD TOGGLE — no event dependency
// ═══════════════════════════════════════════════════
function toggle(id) {
  const card = document.getElementById('ex-' + id);
  const isOpen = card.classList.contains('open');
  // close all
  document.querySelectorAll('.ex').forEach(c => c.classList.remove('open'));
  S.openCard = null;
  if (!isOpen) {
    card.classList.add('open');
    S.openCard = id;
  }
}

// ═══════════════════════════════════════════════════
//  TIMER — isolated per id
// ═══════════════════════════════════════════════════
function fmt(s) {
  return Math.floor(s / 60) + ':' + (s % 60 < 10 ? '0' : '') + (s % 60);
}

function startTimer(id, dur) {
  if (S.timers[id]) clearInterval(S.timers[id]);
  const el = document.getElementById('td-' + id);
  if (!el) return;
  let rem = dur;
  el.classList.add('run');
  S.timers[id] = setInterval(() => {
    rem--;
    el.textContent = fmt(rem);
    if (rem <= 0) {
      clearInterval(S.timers[id]);
      delete S.timers[id];
      el.classList.remove('run');
      el.textContent = '✓';
      beep();
    }
  }, 1000);
}

function resetTimer(id, dur) {
  if (S.timers[id]) { clearInterval(S.timers[id]); delete S.timers[id]; }
  const el = document.getElementById('td-' + id);
  if (!el) return;
  el.classList.remove('run');
  el.textContent = fmt(dur);
}

function beep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = 880;
    g.gain.setValueAtTime(0.3, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
    o.start(); o.stop(ctx.currentTime + 0.5);
  } catch (e) {}
}

// ═══════════════════════════════════════════════════
//  MARK DONE — safe, no event dependency
// ═══════════════════════════════════════════════════
function markDone(id) {
  S.completed.add(id);
  const card = document.getElementById('ex-' + id);
  if (card) {
    card.classList.add('done');
    card.classList.remove('open');
  }
  S.openCard = null;

  // stop any running timer for this card
  if (S.timers[id]) { clearInterval(S.timers[id]); delete S.timers[id]; }

  // update progress bar
  const pct = Math.round((S.completed.size / S.total) * 100);
  const bar = document.getElementById('pBar');
  const pctEl = document.getElementById('pPct');
  const cntEl = document.getElementById('pCount');
  if (bar) bar.style.width = pct + '%';
  if (pctEl) pctEl.textContent = pct + '%';
  if (cntEl) cntEl.textContent = S.completed.size + '/' + S.total;

  // show completion
  if (S.completed.size === S.total) {
    const msg = document.getElementById('completeMsg');
    if (msg) msg.style.display = 'block';
    confetti();
  }
}

// ═══════════════════════════════════════════════════
//  AUTO LOG from treino page
// ═══════════════════════════════════════════════════
function logToday() {
  const n = new Date();
  const key = n.getFullYear() + '-' + (n.getMonth() + 1) + '-' + n.getDate();
  const d = getData();
  const painBtn = document.querySelector('.pn.on');
  d[key] = {
    trained: true,
    pain: painBtn ? parseInt(painBtn.dataset.v) : null,
    note: 'Treino completo ✓'
  };
  saveData(d);
  alert('✅ Treino registrado no calendário!');
}

// ═══════════════════════════════════════════════════
//  CALENDAR
// ═══════════════════════════════════════════════════
const MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const MO = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const DOW = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

function shiftMonth(d) {
  S.calMonth += d;
  if (S.calMonth < 0) { S.calMonth = 11; S.calYear--; }
  if (S.calMonth > 11) { S.calMonth = 0; S.calYear++; }
  renderCal();
}

function renderCal() {
  const label = document.getElementById('calLabel');
  const grid = document.getElementById('calGrid');
  if (!label || !grid) return;

  label.textContent = MONTHS[S.calMonth] + ' ' + S.calYear;
  grid.innerHTML = '';

  // day-of-week headers
  DOW.forEach(d => {
    const el = document.createElement('div');
    el.className = 'cdow';
    el.textContent = d;
    grid.appendChild(el);
  });

  const firstDay = new Date(S.calYear, S.calMonth, 1).getDay();
  const daysInMonth = new Date(S.calYear, S.calMonth + 1, 0).getDate();
  const data = getData();
  const today = new Date();

  // empty cells
  for (let i = 0; i < firstDay; i++) {
    const el = document.createElement('div');
    el.className = 'cday empty';
    grid.appendChild(el);
  }

  // day cells
  for (let d = 1; d <= daysInMonth; d++) {
    const key = S.calYear + '-' + (S.calMonth + 1) + '-' + d;
    const rec = data[key];
    const isToday = today.getDate() === d && today.getMonth() === S.calMonth && today.getFullYear() === S.calYear;

    const el = document.createElement('div');
    el.className = 'cday';
    if (isToday) el.classList.add('today');
    if (rec && rec.trained) el.classList.add('trained');
    if (rec && rec.pain != null && rec.pain >= 7) el.classList.add('pain-hi');

    let inner = '<span>' + d + '</span>';
    if (rec && rec.pain != null) {
      const color = rec.pain >= 7 ? '#ff6b35' : rec.pain >= 4 ? '#ffd166' : '#00e5a0';
      inner += '<div class="cdot" style="background:' + color + '"></div>';
    }
    el.innerHTML = inner;

    // capture d for closure
    (function(day) {
      el.onclick = function() { openModal(day); };
    })(d);

    grid.appendChild(el);
  }

  updateStats(data);
  renderLog(data);
}

function updateStats(data) {
  const keys = Object.keys(data).filter(k => {
    const parts = k.split('-');
    return parseInt(parts[0]) === S.calYear && parseInt(parts[1]) === S.calMonth + 1;
  });
  const trained = keys.filter(k => data[k] && data[k].trained);
  const pains = keys.filter(k => data[k] && data[k].pain != null).map(k => data[k].pain);

  const el = id => document.getElementById(id);
  if (el('stTreinos')) el('stTreinos').textContent = trained.length;
  if (el('stDor')) el('stDor').textContent = pains.length ? (pains.reduce((a,b)=>a+b,0)/pains.length).toFixed(1)+'/10' : '—';

  // streak
  let streak = 0, cur = new Date();
  for (let i = 0; i < 365; i++) {
    const k = cur.getFullYear()+'-'+(cur.getMonth()+1)+'-'+cur.getDate();
    if (data[k] && data[k].trained) { streak++; cur.setDate(cur.getDate()-1); }
    else break;
  }
  if (el('stStreak')) el('stStreak').textContent = streak + ' dias';

  // last trained
  const allTrained = Object.keys(data).filter(k => data[k] && data[k].trained).sort().reverse();
  if (el('stLast') && allTrained.length) {
    const p = allTrained[0].split('-');
    el('stLast').textContent = p[2] + ' ' + MO[parseInt(p[1])-1];
  } else if (el('stLast')) {
    el('stLast').textContent = '—';
  }
}

function renderLog(data) {
  const el = document.getElementById('logList');
  if (!el) return;
  const entries = Object.keys(data).sort().reverse().slice(0, 15);
  if (!entries.length) { el.textContent = 'Nenhum registro ainda. Toque num dia para começar!'; return; }
  el.innerHTML = '';
  entries.forEach(k => {
    const p = k.split('-');
    const rec = data[k];
    const row = document.createElement('div');
    row.className = 'log-item';
    const color = rec.pain != null ? (rec.pain>=7?'#ff6b35':rec.pain>=4?'#ffd166':'#00e5a0') : '#8b949e';
    row.innerHTML =
      '<span class="log-date">' + p[2] + ' ' + MO[parseInt(p[1])-1] + '</span>' +
      '<span style="font-size:18px">' + (rec.trained ? '🏋️' : '💤') + '</span>' +
      (rec.pain != null ? '<span class="log-pain">Dor: <strong style="color:'+color+'">'+rec.pain+'/10</strong></span>' : '') +
      (rec.note ? '<span class="log-note">' + rec.note + '</span>' : '');
    el.appendChild(row);
  });
}

// ═══════════════════════════════════════════════════
//  MODAL
// ═══════════════════════════════════════════════════
function openModal(day) {
  S.modal.day = day;
  const key = S.calYear + '-' + (S.calMonth + 1) + '-' + day;
  const rec = getData()[key] || {};
  S.modal.trained = rec.trained !== undefined ? rec.trained : null;
  S.modal.pain = rec.pain != null ? rec.pain : null;

  document.getElementById('mTitle').textContent = day + ' de ' + MO[S.calMonth] + ' ' + S.calYear;
  document.getElementById('mnote').value = rec.note || '';
  document.getElementById('mYes').className = 'ynb' + (rec.trained ? ' yes' : '');
  document.getElementById('mNo').className = 'ynb' + (rec.trained === false ? ' no' : '');
  document.querySelectorAll('.mpb').forEach((b, i) => {
    b.classList.toggle('on', i === rec.pain);
  });
  document.getElementById('overlay').classList.add('on');
}

function closeModal() {
  document.getElementById('overlay').classList.remove('on');
}

function setTrained(v) {
  S.modal.trained = v;
  document.getElementById('mYes').className = 'ynb' + (v ? ' yes' : '');
  document.getElementById('mNo').className = 'ynb' + (!v ? ' no' : '');
}

function setPain(btn, v) {
  S.modal.pain = v;
  document.querySelectorAll('.mpb').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
}

function saveDay() {
  if (S.modal.day === null) return;
  const key = S.calYear + '-' + (S.calMonth + 1) + '-' + S.modal.day;
  const d = getData();
  d[key] = { trained: S.modal.trained, pain: S.modal.pain, note: document.getElementById('mnote').value };
  saveData(d);
  closeModal();
  renderCal();
}

function deleteDay() {
  if (S.modal.day === null) return;
  const key = S.calYear + '-' + (S.calMonth + 1) + '-' + S.modal.day;
  const d = getData();
  delete d[key];
  saveData(d);
  closeModal();
  renderCal();
}

// close modal clicking outside
document.getElementById('overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ═══════════════════════════════════════════════════
//  CONFETTI
// ═══════════════════════════════════════════════════
function confetti() {
  const colors = ['#00e5a0','#00b4d8','#ff6b35','#ffd166','#fff'];
  for (let i = 0; i < 55; i++) {
    setTimeout(() => {
      const dot = document.createElement('div');
      dot.className = 'cdot-fx';
      dot.style.left = Math.random() * 100 + 'vw';
      dot.style.top = '-10px';
      dot.style.background = colors[Math.floor(Math.random() * colors.length)];
      dot.style.animationDuration = (1.5 + Math.random() * 2) + 's';
      document.body.appendChild(dot);
      setTimeout(() => dot.remove(), 3000);
    }, i * 40);
  }
}

