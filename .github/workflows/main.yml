<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Força no Joelho</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── RESET & VARS ─────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0d1117; --surface:#161b22; --card:#1c2330; --border:#30363d;
  --accent:#00e5a0; --accent2:#00b4d8; --warn:#ff6b35; --done:#238636;
  --text:#e6edf3; --muted:#8b949e;
  --light:#f2c4ce; --medium:#b8a0d4; --heavy:#9b7fc7; --xheavy:#6b4fa0; --xxheavy:#4a3f60;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,160,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,160,.025) 1px,transparent 1px);background-size:44px 44px;pointer-events:none;}

/* ── NAV ──────────────────────────────────────── */
.nav{position:sticky;top:0;z-index:100;background:rgba(13,17,23,.95);backdrop-filter:blur(14px);border-bottom:1px solid var(–border);display:flex;}
.tab{flex:1;padding:14px 6px;border:none;background:transparent;color:var(–muted);font-family:‘DM Sans’,sans-serif;font-size:12px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;letter-spacing:.3px;}
.tab.on{color:var(–accent);border-bottom-color:var(–accent);}
.tab:hover{color:var(–text);}

/* ── PAGES ────────────────────────────────────── */
.page{display:none;max-width:860px;margin:0 auto;padding:20px 16px 80px;position:relative;z-index:1;}
.page.on{display:block;}

/* ── TYPOGRAPHY ───────────────────────────────── */
.lbl{font-size:10px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(–accent);margin-bottom:6px;}
.h1{font-family:‘Bebas Neue’,sans-serif;font-size:clamp(36px,9vw,64px);line-height:.9;margin-bottom:10px;}
.h1 em{color:var(–accent);font-style:normal;}
.sub{font-size:13px;color:var(–muted);line-height:1.65;max-width:500px;margin-bottom:12px;}
.sec{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(–muted);margin:22px 0 10px;padding-left:2px;}
.badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,107,53,.1);border:1px solid rgba(255,107,53,.3);color:var(–warn);font-size:12px;font-weight:500;padding:4px 12px;border-radius:20px;}

/* ── PROGRESS BAR ─────────────────────────────── */
.progbar{background:var(–surface);border:1px solid var(–border);border-radius:12px;padding:14px 18px;margin:16px 0;display:flex;align-items:center;gap:14px;}
.progbar-txt{font-size:12px;color:var(–muted);white-space:nowrap;}
.progbar-txt strong{color:var(–accent);font-size:18px;font-weight:700;display:block;line-height:1.1;}
.track{flex:1;background:var(–border);border-radius:999px;height:7px;overflow:hidden;}
.fill{height:100%;background:linear-gradient(90deg,var(–accent),var(–accent2));border-radius:999px;transition:width .5s ease;width:0%;}

/* ── PAIN SCALE ───────────────────────────────── */
.pain-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:18px;}
.pain-lbl{font-size:11px;color:var(–muted);margin-right:4px;}
.pn{width:28px;height:28px;border-radius:6px;border:1px solid var(–border);background:var(–surface);color:var(–muted);font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;font-family:‘DM Sans’,sans-serif;}
.pn:hover{border-color:var(–text);color:var(–text);}
.pn.on{border-color:var(–warn);background:rgba(255,107,53,.15);color:var(–warn);}
.pain-alert{font-size:12px;color:var(–warn);font-weight:500;display:none;margin-left:6px;}
.pain-alert.on{display:inline;}

/* ── BAND LEGEND ──────────────────────────────── */
.bands{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px;}
.band-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:20px;font-size:11px;font-weight:600;border:1.5px solid;}
.dot{width:8px;height:8px;border-radius:50%;}

/* ── EXERCISE CARD ────────────────────────────── */
.ex{background:var(–card);border:1px solid var(–border);border-radius:16px;margin-bottom:12px;overflow:hidden;transition:border-color .2s,box-shadow .2s;}
.ex:hover{border-color:rgba(0,229,160,.2);}
.ex.done{border-color:rgba(35,134,54,.45);background:rgba(35,134,54,.05);}
.ex-head{display:flex;align-items:center;gap:12px;padding:15px 16px;cursor:pointer;user-select:none;}
.ex-num{font-family:‘Bebas Neue’,sans-serif;font-size:26px;color:var(–border);width:32px;text-align:center;flex-shrink:0;transition:color .3s;}
.ex.done .ex-num{color:var(–done);}
.ex-info{flex:1;min-width:0;}
.ex-name{font-size:14px;font-weight:600;color:var(–text);}
.ex-muscle{font-size:11px;color:var(–accent2);margin-top:2px;}
.ex-pills{display:flex;gap:7px;flex-shrink:0;}
.pill{background:var(–surface);border:1px solid var(–border);border-radius:7px;padding:3px 8px;font-size:10px;font-weight:500;color:var(–muted);text-align:center;line-height:1.4;}
.pill b{display:block;font-size:13px;font-weight:700;color:var(–text);}
.chev{color:var(–muted);transition:transform .3s;font-size:14px;flex-shrink:0;}
.ex.open .chev{transform:rotate(180deg);}

/* expand */
.ex-body{max-height:0;overflow:hidden;transition:max-height .4s ease;}
.ex.open .ex-body{max-height:1100px;}
.ex-inner{border-top:1px solid var(–border);padding:16px;}

/* ── ILLUSTRATION ─────────────────────────────── */
.illus{background:var(–surface);border:1px solid var(–border);border-radius:12px;margin-bottom:14px;overflow:hidden;}
.illus svg{width:100%;height:auto;display:block;}
.illus-cap{padding:8px 14px;font-size:11px;color:var(–muted);text-align:center;border-top:1px solid var(–border);background:rgba(0,0,0,.2);}

/* how-to */
.howto{font-size:13px;color:var(–muted);line-height:1.75;margin-bottom:12px;}
.howto strong{color:var(–text);}
.tip{background:rgba(0,180,216,.07);border-left:3px solid var(–accent2);border-radius:0 8px 8px 0;padding:8px 12px;font-size:12px;color:var(–accent2);margin-bottom:14px;line-height:1.5;}

/* band selector */
.bsel-lbl{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(–muted);margin-bottom:6px;}
.bopts{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px;}
.bopt{padding:5px 11px;border-radius:20px;border:1.5px solid var(–border);background:transparent;color:var(–muted);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;font-family:‘DM Sans’,sans-serif;}
.bopt.on-light{border-color:var(–light);background:rgba(242,196,206,.12);color:var(–light);}
.bopt.on-medium{border-color:var(–medium);background:rgba(184,160,212,.12);color:var(–medium);}
.bopt.on-heavy{border-color:var(–heavy);background:rgba(155,127,199,.12);color:var(–heavy);}
.bopt.on-xheavy{border-color:#9b6fd4;background:rgba(107,79,160,.12);color:#c4a8ff;}
.bopt.on-xxheavy{border-color:#777;background:rgba(74,63,96,.2);color:#bbb;}

/* sets */
.sets-row{display:flex;align-items:center;gap:7px;margin-bottom:12px;flex-wrap:wrap;}
.sets-lbl{font-size:11px;color:var(–muted);font-weight:500;}
.sdot{width:32px;height:32px;border-radius:50%;border:2px solid var(–border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(–muted);transition:all .2s;user-select:none;}
.sdot:hover{border-color:var(–accent);color:var(–accent);}
.sdot.on{background:var(–accent);border-color:var(–accent);color:#0d1117;}

/* timer */
.timer-row{display:flex;align-items:center;gap:9px;margin-bottom:14px;}
.tdisp{font-family:‘Bebas Neue’,sans-serif;font-size:36px;color:var(–accent);letter-spacing:2px;min-width:68px;}
.tdisp.run{color:var(–warn);animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.45}}

/* buttons */
.btn{padding:9px 15px;border-radius:8px;border:none;cursor:pointer;font-family:‘DM Sans’,sans-serif;font-size:12px;font-weight:600;transition:all .2s;}
.btn-g{background:var(–surface);color:var(–muted);border:1px solid var(–border);}
.btn-g:hover{background:var(–border);color:var(–text);}
.btn-a{background:var(–accent);color:#0d1117;}
.btn-a:hover{background:#00ffc3;}
.btn-done{background:var(–done);color:#fff;}
.btn-done:hover{background:#2ea043;}
.btn-sm{padding:6px 11px;font-size:11px;}
.brow{display:flex;gap:7px;flex-wrap:wrap;margin-top:4px;}

/* ── CALENDAR PAGE ────────────────────────────── */
.cal-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.cal-month-lbl{font-family:‘Bebas Neue’,sans-serif;font-size:28px;letter-spacing:1px;}
.cal-nav{background:var(–surface);border:1px solid var(–border);color:var(–text);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:background .2s;}
.cal-nav:hover{background:var(–border);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
.cdow{text-align:center;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(–muted);padding-bottom:4px;}
.cday{aspect-ratio:1;border-radius:9px;border:1px solid var(–border);background:var(–surface);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;font-size:12px;font-weight:500;color:var(–muted);position:relative;gap:2px;}
.cday:hover{border-color:var(–accent2);color:var(–text);}
.cday.today{border-color:var(–accent2);color:var(–accent2);}
.cday.empty{background:transparent;border-color:transparent;cursor:default;pointer-events:none;}
.cday.trained{background:rgba(0,229,160,.1);border-color:var(–accent);color:var(–accent);}
.cday.pain-hi{background:rgba(255,107,53,.1);border-color:var(–warn);}
.cdot{width:5px;height:5px;border-radius:50%;}

/* stats grid */
.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:9px;margin-top:16px;}
.sc{background:var(–surface);border:1px solid var(–border);border-radius:12px;padding:13px 15px;}
.sc-icon{font-size:18px;margin-bottom:5px;}
.sc-lbl{font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(–muted);margin-bottom:2px;}
.sc-val{font-size:16px;font-weight:700;color:var(–text);}

/* log list */
.log-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(–border);font-size:12px;}
.log-date{font-weight:700;color:var(–text);min-width:54px;}
.log-pain{background:rgba(255,255,255,.05);border:1px solid var(–border);padding:2px 7px;border-radius:7px;font-size:11px;}
.log-note{color:var(–muted);font-style:italic;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* ── MODAL ────────────────────────────────────── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:center;justify-content:center;padding:20px;}
.overlay.on{display:flex;}
.modal{background:var(–card);border:1px solid var(–border);border-radius:20px;padding:24px;max-width:340px;width:100%;}
.modal h3{font-family:‘Bebas Neue’,sans-serif;font-size:24px;color:var(–accent);margin-bottom:16px;}
.mlbl{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(–muted);margin-bottom:7px;}
.mrow{margin-bottom:16px;}
.yn{display:flex;gap:8px;}
.ynb{flex:1;padding:9px;border-radius:9px;border:1.5px solid var(–border);background:transparent;color:var(–muted);font-family:‘DM Sans’,sans-serif;font-weight:600;font-size:13px;cursor:pointer;transition:all .2s;}
.ynb.yes{background:rgba(0,229,160,.12);border-color:var(–accent);color:var(–accent);}
.ynb.no{background:rgba(255,107,53,.1);border-color:var(–warn);color:var(–warn);}
.mpn{display:flex;gap:4px;flex-wrap:wrap;}
.mpb{width:27px;height:27px;border-radius:5px;border:1px solid var(–border);background:var(–surface);color:var(–muted);font-size:11px;font-weight:700;cursor:pointer;font-family:‘DM Sans’,sans-serif;transition:all .15s;}
.mpb.on{border-color:var(–warn);background:rgba(255,107,53,.15);color:var(–warn);}
.mnote{width:100%;background:var(–surface);border:1px solid var(–border);border-radius:8px;padding:9px;color:var(–text);font-family:‘DM Sans’,sans-serif;font-size:12px;resize:none;outline:none;}
.mnote:focus{border-color:var(–accent2);}
.mbtns{display:flex;gap:7px;margin-top:4px;}

/* ── PROGRESSION PAGE ─────────────────────────── */
.ptable{width:100%;border-collapse:collapse;margin-top:10px;font-size:12px;}
.ptable th{font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(–muted);text-align:left;padding:7px 10px;border-bottom:1px solid var(–border);}
.ptable td{padding:9px 10px;border-bottom:1px solid rgba(48,54,61,.4);}
.ptable tr:hover td{background:rgba(255,255,255,.02);}
.wk{display:inline-block;background:var(–surface);border:1px solid var(–border);border-radius:5px;padding:2px 7px;font-size:10px;font-weight:600;color:var(–muted);}
.bt{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:10px;font-size:11px;font-weight:600;border:1.5px solid;}
.bt-l{border-color:var(–light);color:var(–light);background:rgba(242,196,206,.08);}
.bt-m{border-color:var(–medium);color:var(–medium);background:rgba(184,160,212,.08);}
.bt-h{border-color:var(–heavy);color:var(–heavy);background:rgba(155,127,199,.08);}
.bt-x{border-color:#9b6fd4;color:#c4a8ff;background:rgba(107,79,160,.08);}
.bt-xx{border-color:#777;color:#bbb;background:rgba(74,63,96,.15);}
.pnote{font-size:12px;color:var(–muted);background:rgba(0,229,160,.04);border:1px solid rgba(0,229,160,.12);border-radius:10px;padding:13px 15px;margin-top:14px;line-height:1.65;}

/* ── FINISH BOX ───────────────────────────────── */
.finish{background:var(–surface);border:1px solid var(–border);border-radius:14px;padding:22px;text-align:center;margin-top:12px;}
.finish-h{font-family:‘Bebas Neue’,sans-serif;font-size:30px;color:var(–accent);margin-bottom:5px;}
.cooldown{list-style:none;text-align:left;max-width:320px;margin:0 auto 16px;}
.cooldown li{padding:6px 0;border-bottom:1px solid var(–border);font-size:12px;color:var(–muted);display:flex;align-items:center;gap:7px;}
.cooldown li::before{content:’›’;color:var(–accent);font-size:14px;font-weight:700;}
#completeMsg{display:none;}
.complete-title{font-family:‘Bebas Neue’,sans-serif;font-size:40px;color:var(–accent);}

/* confetti */
.cdot-fx{position:fixed;width:7px;height:7px;border-radius:50%;animation:fall 2.5s ease-in forwards;pointer-events:none;z-index:9999;}
@keyframes fall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(105vh) rotate(720deg);opacity:0}}

@media(max-width:540px){.ex-pills{display:none}.sgrid{grid-template-columns:1fr 1fr}}
</style>

</head>
